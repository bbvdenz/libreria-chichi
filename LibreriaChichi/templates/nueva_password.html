{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña — Librería Chichi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --magenta:#e8007d; --violet:#7c3aed; --violet-light:#a855f7;
            --green:#10b981;
            --bg:#0d0d14; --surface:#13131f; --surface2:#1a1a2e;
            --border:rgba(255,255,255,0.08); --text:#f0f0f8; --text-muted:#8888aa;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            background:var(--bg); color:var(--text);
            font-family:'DM Sans',sans-serif;
            min-height:100vh; display:flex; flex-direction:column;
        }
        .ambient {
            position:fixed; inset:0; pointer-events:none; z-index:0;
            background:radial-gradient(ellipse 60% 60% at 50% 30%, rgba(16,185,129,0.12) 0%, transparent 70%);
        }
        .top-bar {
            position:relative; z-index:10;
            background:rgba(13,13,20,0.88); backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);
            padding:14px 28px;
            display:flex; align-items:center;
        }
        .brand { display:flex; align-items:center; gap:12px; text-decoration:none; }
        .brand-logo-wrap {
            width:44px; height:44px; border-radius:12px;
            background:linear-gradient(135deg,var(--magenta),var(--violet));
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; overflow:hidden;
        }
        .brand-logo-wrap img { width:100%; height:100%; object-fit:cover; }
        .brand-name {
            font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:900;
            background:linear-gradient(90deg,#fff 0%,var(--magenta) 55%,var(--violet-light) 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .page-wrap {
            position:relative; z-index:1; flex:1;
            display:flex; align-items:center; justify-content:center;
            padding:40px 20px;
        }
        .card {
            width:100%; max-width:420px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:24px; padding:48px 44px;
            box-shadow:0 32px 80px rgba(0,0,0,0.5);
            animation:fadeUp 0.5s ease both;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .card-icon {
            width:60px; height:60px; border-radius:16px;
            background:linear-gradient(135deg,var(--green),#34d399);
            display:flex; align-items:center; justify-content:center;
            font-size:1.4rem; color:#000; margin:0 auto 24px;
            box-shadow:0 8px 24px rgba(16,185,129,0.4);
        }
        .card-title {
            font-family:'Playfair Display',serif; font-size:1.7rem; font-weight:900;
            text-align:center; color:#fff; margin-bottom:6px;
        }
        .card-sub {
            text-align:center; color:var(--text-muted);
            font-size:0.88rem; margin-bottom:32px;
        }
        .field-group { margin-bottom:20px; }
        .field-label {
            display:block; font-size:0.82rem; font-weight:700;
            letter-spacing:0.5px; text-transform:uppercase;
            color:var(--text-muted); margin-bottom:8px;
        }
        .field-wrap { position:relative; }
        .field-icon {
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:var(--text-muted); font-size:0.9rem; pointer-events:none;
        }
        .field-input {
            width:100%; background:var(--surface2);
            border:1.5px solid var(--border); border-radius:12px;
            padding:13px 14px 13px 42px;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem;
            transition:border-color 0.2s;
        }
        .field-input:focus {
            outline:none; border-color:var(--green);
            box-shadow:0 0 0 3px rgba(16,185,129,0.15);
        }
        .field-input::placeholder { color:#55556a; }

        /* Indicador de fuerza de contraseña */
        .pass-strength { margin-top:6px; height:4px; border-radius:4px; background:var(--border); overflow:hidden; }
        .pass-strength-bar { height:100%; border-radius:4px; transition:width 0.3s, background 0.3s; width:0%; }
        .pass-hint { font-size:0.72rem; color:var(--text-muted); margin-top:4px; }

        .btn-submit {
            width:100%; padding:14px;
            background:linear-gradient(135deg,var(--green),#34d399);
            color:#000; border:none; border-radius:12px;
            font-family:'DM Sans',sans-serif; font-weight:800; font-size:1rem;
            cursor:pointer; transition:all 0.25s;
            box-shadow:0 6px 20px rgba(16,185,129,0.35);
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(16,185,129,0.45); }
        .alert-error {
            background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
            border-radius:12px; padding:14px; color:#fca5a5;
            font-size:0.88rem; font-weight:600;
            display:flex; gap:10px; align-items:center; margin-bottom:20px;
        }

        @media(max-width:480px) { .card { padding:32px 20px; } }
    </style>
</head>
<body>
<div class="ambient"></div>

<div class="top-bar">
    <a href="{% url 'inicio' %}" class="brand">
        <div class="brand-logo-wrap">
            <img src="{% static 'imagenes/logo.png' %}" alt="Logo" onerror="this.parentElement.innerHTML='📚'">
        </div>
        <span class="brand-name">Librería Chichi</span>
    </a>
</div>

<div class="page-wrap">
    <div class="card">
        <div class="card-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <h1 class="card-title">Nueva Contraseña</h1>
        <p class="card-sub">Ingresa tu nueva contraseña (mínimo 8 caracteres).</p>

        {% if messages %}
            {% for message in messages %}
            <div class="alert-error">
                <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="field-group">
                <label class="field-label">Nueva contraseña</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" name="nueva_password" id="nuevaPass"
                           class="field-input" placeholder="••••••••"
                           required minlength="8" autofocus>
                </div>
                <div class="pass-strength">
                    <div class="pass-strength-bar" id="strengthBar"></div>
                </div>
                <p class="pass-hint" id="passHint">Mínimo 8 caracteres</p>
            </div>
            <div class="field-group">
                <label class="field-label">Confirmar contraseña</label>
                <div class="field-wrap">
                    <i class="fa-solid fa-lock field-icon"></i>
                    <input type="password" name="confirmar_password" id="confirmarPass"
                           class="field-input" placeholder="••••••••"
                           required minlength="8">
                </div>
            </div>
            <button type="submit" class="btn-submit">
                <i class="fa-solid fa-check"></i> Guardar contraseña
            </button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>
<script>
    // Indicador visual de fuerza de contraseña
    const input = document.getElementById('nuevaPass');
    const bar = document.getElementById('strengthBar');
    const hint = document.getElementById('passHint');

    input.addEventListener('input', function() {
        const val = this.value;
        let fuerza = 0;
        if (val.length >= 8) fuerza++;
        if (/[A-Z]/.test(val)) fuerza++;
        if (/[0-9]/.test(val)) fuerza++;
        if (/[^A-Za-z0-9]/.test(val)) fuerza++;

        const colores = ['#f87171','#fb923c','#facc15','#34d399'];
        const textos = ['Muy débil','Débil','Aceptable','Segura'];
        const anchos = ['25%','50%','75%','100%'];

        if (val.length === 0) {
            bar.style.width = '0%';
            hint.textContent = 'Mínimo 8 caracteres';
            hint.style.color = 'var(--text-muted)';
        } else {
            const i = Math.max(0, fuerza - 1);
            bar.style.width = anchos[i];
            bar.style.background = colores[i];
            hint.textContent = textos[i];
            hint.style.color = colores[i];
        }
    });
</script>
<script>
(function () {
  document.querySelectorAll('input[type="password"]').forEach(function (inp) {
    if (inp.dataset.eye) return;
    inp.dataset.eye = '1';
    var wrap = inp.parentElement;
    if (getComputedStyle(wrap).position === 'static') wrap.style.position = 'relative';
    inp.style.paddingRight = '44px';
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Mostrar u ocultar contrasena');
    btn.innerHTML = '<i class="fa-solid fa-eye"></i>';
    btn.style.cssText = 'position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8888aa;cursor:pointer;font-size:1rem;padding:6px;line-height:1;z-index:5;';
    btn.addEventListener('click', function () {
      var show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.innerHTML = show ? '<i class="fa-solid fa-eye-slash"></i>' : '<i class="fa-solid fa-eye"></i>';
    });
    wrap.appendChild(btn);
  });
})();
</script>
</body>
</html>
